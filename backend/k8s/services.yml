# ═══════════════════════════════════════════════
# Kubernetes Services Deployment Template
# ═══════════════════════════════════════════════
# Apply per-service. Replace {{SERVICE}} and {{PORT}} vars.
#
# Usage:
#   kubectl apply -f k8s/infrastructure.yml
#   kubectl apply -f k8s/services.yml
# ═══════════════════════════════════════════════

# ─── Eureka Server ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: dulich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: dulich/eureka-server:latest
          ports:
            - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: dulich
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
---
# ─── API Gateway (LoadBalancer) ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: dulich
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: dulich/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: dulich
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
---
# ─── Auth Service ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dulich
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: dulich/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: dulich-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/auth_db"
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: dulich
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
---
