# ===========================================================
# Docker Compose — Travel Booking Microservices Platform
# ===========================================================
# Architecture: 12 Microservices + RabbitMQ + Redis + Multi-DB
#
# Start:  docker compose up -d --build
# Stop:   docker compose down
# Logs:   docker compose logs -f [service-name]
# Reset:  docker compose down -v (removes volumes)
# ===========================================================

version: '3.8'

services:
  # ═══════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ═══════════════════════════════════════════════

  # ─── PostgreSQL — Multiple Databases ───
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dulich
      POSTGRES_PASSWORD: dulich_secret
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,tour_db,booking_db,payment_db,review_db,itinerary_db,notification_db,expense_db,analytics_db,pricing_db
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=256MB
      -c work_mem=8MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - travel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dulich"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── RabbitMQ — Message Broker ───
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: dulich
      RABBITMQ_DEFAULT_PASS: dulich_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Redis — Caching & Session ───
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass dulich_secret
    volumes:
      - redis_data:/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dulich_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch — Full-text Search ───
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── MinIO — S3-compatible Object Storage ───
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: dulich
      MINIO_ROOT_PASSWORD: dulich_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════════════
  #  SERVICE DISCOVERY & GATEWAY
  # ═══════════════════════════════════════════════

  # ─── Eureka Server ───
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - travel-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── API Gateway ───
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - travel-network

  # ═══════════════════════════════════════════════
  #  CORE SERVICES
  # ═══════════════════════════════════════════════

  # ─── Auth Service ───
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: dulich
      SPRING_RABBITMQ_PASSWORD: dulich_secret
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: dulich_secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - travel-network

  # ─── User Service ───
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: dulich
      SPRING_RABBITMQ_PASSWORD: dulich_secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - travel-network

  # ─── Tour Catalog Service ───
  tour-service:
    build: ./tour-service
    container_name: tour-service
    ports:
