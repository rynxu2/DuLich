# ===========================================================
# Docker Compose — Travel Booking Platform (CONSOLIDATED)
# ===========================================================
# OPTIMIZED for 8GB RAM Local Development
#
# Architecture: 4 Business Services + 2 Infra + 4 Infrastructure
#
# ── Consolidated Services ──
#   identity-service   (8081) ← auth + user
#   tour-service       (8082) ← tour + guide + review + itinerary + pricing
#   booking-service    (8083) ← booking + payment + expense + realtime
#   platform-service   (8084) ← notification + analytics + admin + storage
#
# ── Commands ──
#   Dev (core only):  docker compose --profile infra --profile core up -d --build
#   Full stack:       docker compose --profile infra --profile core --profile advanced up -d --build
#   Stop:             docker compose --profile infra --profile core --profile advanced down
#   Reset:            docker compose --profile infra --profile core --profile advanced down -v
# ===========================================================

# ── Shared Configs ──
x-java-service: &java-service
  restart: unless-stopped
  networks:
    - travel-network
  logging:
    driver: json-file
    options:
      max-size: "5m"
      max-file: "3"

x-java-env: &java-env
  SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_USERNAME: dulich
  SPRING_RABBITMQ_PASSWORD: dulich_secret
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PASSWORD: dulich_secret
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
  JAVA_TOOL_OPTIONS: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=75.0
    -XX:+UseG1GC
    -XX:+ExitOnOutOfMemoryError
    -Djava.security.egd=file:/dev/./urandom
  SPRING_JPA_OPEN_IN_VIEW: "false"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "20000"

services:
  # ═══════════════════════════════════════════════
  #  INFRASTRUCTURE — Profile: infra
  # ═══════════════════════════════════════════════

  # ─── RabbitMQ ───
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    profiles: ["infra"]
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: dulich
      RABBITMQ_DEFAULT_PASS: dulich_secret
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.4"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.30"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "3m"
        max-file: "2"

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles: ["infra"]
    ports:
      - "6379:6379"
    command: redis-server --requirepass dulich_secret --maxmemory 48mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dulich_secret", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO (S3 Storage) ───
  minio:
    image: minio/minio:latest
    container_name: minio
    profiles: ["infra"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: dulich
      MINIO_ROOT_PASSWORD: dulich_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.20"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  #  GATEWAY & DISCOVERY — Profile: core
  # ═══════════════════════════════════════════════

  # ─── Eureka Server ───
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8761:8761"
    environment:
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseSerialGC
        -XX:+ExitOnOutOfMemoryError
        -Djava.security.egd=file:/dev/./urandom
      EUREKA_SERVER_ENABLE_SELF_PRESERVATION: "false"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.30"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ─── API Gateway ───
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8080:8080"
    environment:
      <<: *java-env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.40"
        reservations:
          memory: 128M
    depends_on:
      eureka-server:
        condition: service_healthy

  # ═══════════════════════════════════════════════
  #  CONSOLIDATED BUSINESS SERVICES — Profile: core
  # ═══════════════════════════════════════════════

  # ─── Identity Service (auth + user) ───
  identity-service:
    build: ./identity-service
    container_name: identity-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8081:8081"
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://${AIVEN_HOST}:${AIVEN_PORT}/identity_db?sslmode=require
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.35"
        reservations:
          memory: 128M
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Tour Service (tour + guide + review + itinerary + pricing) ───
  tour-service:
    build: ./tour-service
    container_name: tour-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8082:8082"
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://${AIVEN_HOST}:${AIVEN_PORT}/tour_db?sslmode=require
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.40"
        reservations:
          memory: 160M
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Booking Service (booking + payment + expense + realtime) ───
  booking-service:
    build: ./booking-service
    container_name: booking-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8083:8083"
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://${AIVEN_HOST}:${AIVEN_PORT}/booking_db?sslmode=require
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.40"
        reservations:
          memory: 160M
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Platform Service (notification + analytics + admin + storage) ───
  platform-service:
    build: ./platform-service
    container_name: platform-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8084:8084"
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://${AIVEN_HOST}:${AIVEN_PORT}/platform_db?sslmode=require
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-dulich}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-dulich_secret}
      MINIO_BUCKET_NAME: dulich-files
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.40"
        reservations:
          memory: 160M
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

# ═══════════════════════════════════════════════
#  VOLUMES & NETWORKS
# ═══════════════════════════════════════════════
volumes:
  rabbitmq_data:
  redis_data:
  minio_data:

networks:
  travel-network:
    driver: bridge
