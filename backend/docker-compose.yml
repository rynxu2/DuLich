# ===========================================================
# Docker Compose — Travel Booking Microservices Platform
# ===========================================================
# OPTIMIZED for 8GB RAM Local Development
#
# Architecture: 14 Microservices + RabbitMQ + Redis + PostgreSQL + MinIO
#
# ── Profiles ──
#   infra     → PostgreSQL, RabbitMQ, Redis, MinIO (required)
#   core      → Eureka, Gateway, Auth, User, Tour, Booking, Payment
#   advanced  → Review, Itinerary, Notification, Guide, Analytics,
#               Realtime, Admin, Expense, Pricing, Storage
#
# ── Commands ──
#   Dev (core only):  docker compose --profile infra --profile core up -d --build
#   Full stack:       docker compose --profile infra --profile core --profile advanced up -d --build
#   Monitor:          docker stats --no-stream
#   Stop:             docker compose --profile infra --profile core --profile advanced down
#   Reset:            docker compose --profile infra --profile core --profile advanced down -v
# ===========================================================

# ── Shared Configs ──
x-java-service: &java-service
  restart: unless-stopped
  networks:
    - travel-network
  logging:
    driver: json-file
    options:
      max-size: "5m"
      max-file: "3"

x-java-env: &java-env
  SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_USERNAME: dulich
  SPRING_RABBITMQ_PASSWORD: dulich_secret
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PASSWORD: dulich_secret
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
  # ── JVM Tuning for Containers ──
  JAVA_TOOL_OPTIONS: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=75.0
    -XX:+UseG1GC
    -XX:+ExitOnOutOfMemoryError
    -Djava.security.egd=file:/dev/./urandom
  # ── Spring Optimizations ──
  SPRING_JPA_OPEN_IN_VIEW: "false"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "20000"

x-small-java-env: &small-java-env
  <<: *java-env
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"

services:
  # ═══════════════════════════════════════════════
  #  INFRASTRUCTURE — Profile: infra
  # ═══════════════════════════════════════════════

  # ─── PostgreSQL (Tuned for Dev) ───
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    profiles: ["infra"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dulich
      POSTGRES_PASSWORD: dulich_secret
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,tour_db,booking_db,payment_db,review_db,itinerary_db,notification_db,expense_db,analytics_db,pricing_db
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c effective_cache_size=128MB
      -c maintenance_work_mem=32MB
      -c wal_buffers=4MB
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.50"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dulich"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── RabbitMQ (Slim) ───
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    profiles: ["infra"]
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: dulich
      RABBITMQ_DEFAULT_PASS: dulich_secret
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.4"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.30"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "3m"
        max-file: "2"

  # ─── Redis (Minimal) ───
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles: ["infra"]
    ports:
      - "6379:6379"
    command: redis-server --requirepass dulich_secret --maxmemory 48mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dulich_secret", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO (S3 Storage) ───
  minio:
    image: minio/minio:latest
    container_name: minio
    profiles: ["infra"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: dulich
      MINIO_ROOT_PASSWORD: dulich_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.20"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  #  GATEWAY & DISCOVERY — Profile: core
  # ═══════════════════════════════════════════════

  # ─── Eureka Server ───
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8761:8761"
    environment:
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseSerialGC
        -XX:+ExitOnOutOfMemoryError
        -Djava.security.egd=file:/dev/./urandom
      EUREKA_SERVER_ENABLE_SELF_PRESERVATION: "false"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.30"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy

  # ─── API Gateway ───
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8080:8080"
    environment:
      <<: *java-env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.40"
        reservations:
          memory: 128M
    depends_on:
      eureka-server:
        condition: service_healthy

  # ═══════════════════════════════════════════════
  #  CORE SERVICES — Profile: core
  # ═══════════════════════════════════════════════

  # ─── Auth Service ───
  auth-service:
    build: ./auth-service
    container_name: auth-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8081:8081"
    environment:
      <<: *java-env
    deploy:
      resources:
        limits:
          memory: 224M
          cpus: "0.30"
        reservations:
          memory: 128M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── User Service ───
  user-service:
    build: ./user-service
    container_name: user-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8082:8082"
    environment:
      <<: *java-env
    deploy:
      resources:
        limits:
          memory: 224M
          cpus: "0.30"
        reservations:
          memory: 128M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Tour Service ───
  tour-service:
    build: ./tour-service
    container_name: tour-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8088:8088"
    environment:
      <<: *java-env
      # Elasticsearch disabled in dev — use PostgreSQL ILIKE
      # SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
    deploy:
      resources:
        limits:
          memory: 224M
          cpus: "0.30"
        reservations:
          memory: 128M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Booking Service ───
  booking-service:
    build: ./booking-service
    container_name: booking-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8089:8089"
    environment:
      <<: *java-env
    deploy:
      resources:
        limits:
          memory: 224M
          cpus: "0.30"
        reservations:
          memory: 128M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Payment Service ───
  payment-service:
    build: ./payment-service
    container_name: payment-service
    profiles: ["core"]
    <<: *java-service
    ports:
      - "8085:8085"
    environment:
      <<: *java-env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ═══════════════════════════════════════════════
  #  ADVANCED SERVICES — Profile: advanced
  # ═══════════════════════════════════════════════

  # ─── Review Service ───
  review-service:
    build: ./review-service
    container_name: review-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8086:8086"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Itinerary Service ───
  itinerary-service:
    build: ./itinerary-service
    container_name: itinerary-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8084:8084"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Notification Service ───
  notification-service:
    build: ./notification-service
    container_name: notification-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8091:8091"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Guide Service ───
  guide-service:
    build: ./guide-service
    container_name: guide-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8092:8092"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 176M
          cpus: "0.20"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Analytics Service ───
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8093:8093"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Realtime Service ───
  realtime-service:
    build: ./realtime-service
    container_name: realtime-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8094:8094"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Admin Service ───
  admin-service:
    build: ./admin-service
    container_name: admin-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8095:8095"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 176M
          cpus: "0.20"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Expense Service ───
  expense-service:
    build: ./expense-service
    container_name: expense-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8096:8096"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 176M
          cpus: "0.20"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Pricing Service ───
  pricing-service:
    build: ./pricing-service
    container_name: pricing-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8097:8097"
    environment:
      <<: *small-java-env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Storage Service ───
  storage-service:
    build: ./storage-service
    container_name: storage-service
    profiles: ["advanced"]
    <<: *java-service
    ports:
      - "8098:8098"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseSerialGC
        -Djava.security.egd=file:/dev/./urandom
    deploy:
      resources:
        limits:
          memory: 176M
          cpus: "0.20"
        reservations:
          memory: 96M
    depends_on:
      eureka-server:
        condition: service_healthy
      minio:
        condition: service_started

  # ═══════════════════════════════════════════════
  #  OPTIONAL — Elasticsearch (Full-text search)
  #  Only enable when explicitly needed
  # ═══════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    profiles: ["search"]
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

# ═══════════════════════════════════════════════
#  VOLUMES & NETWORKS
# ═══════════════════════════════════════════════
volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  es_data:
  minio_data:

networks:
  travel-network:
    driver: bridge
