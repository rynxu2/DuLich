server:
  port: 8098
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  application:
    name: storage-service

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:dulich}
  secret-key: ${MINIO_SECRET_KEY:dulich_secret}
  bucket-name: dulich-storage

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
