server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # ═══════════════════════════════════════════════════════
        #  IDENTITY SERVICE (auth + user + favorites)
        #  Port 8081 — merged from: auth-service, user-service
        # ═══════════════════════════════════════════════════════
        - id: identity-auth
          uri: lb://identity-service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: identity-users
          uri: lb://identity-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: identity-favorites
          uri: lb://identity-service
          predicates:
            - Path=/api/favorites/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        # ═══════════════════════════════════════════════════════
        #  TOUR SERVICE (tours + guides + reviews + itinerary + pricing)
        #  Port 8082 — merged from: tour, guide, review, itinerary, pricing
        # ═══════════════════════════════════════════════════════
        - id: tour-catalog
          uri: lb://tour-service
          predicates:
            - Path=/api/tours/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: tour-guides
          uri: lb://tour-service
          predicates:
            - Path=/api/guides/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: tour-reviews
          uri: lb://tour-service
          predicates:
            - Path=/api/reviews/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: tour-itinerary
          uri: lb://tour-service
          predicates:
            - Path=/api/itinerary/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: tour-pricing
          uri: lb://tour-service
          predicates:
            - Path=/api/pricing/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        # ═══════════════════════════════════════════════════════
        #  BOOKING SERVICE (bookings + payments + expenses + realtime)
        #  Port 8083 — merged from: booking, payment, expense, realtime
        # ═══════════════════════════════════════════════════════
        - id: booking-main
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: booking-payments
          uri: lb://booking-service
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: booking-expenses
          uri: lb://booking-service
          predicates:
            - Path=/api/expenses/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: booking-realtime
          uri: lb://booking-service
          predicates:
            - Path=/api/realtime/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: booking-websocket
          uri: lb:ws://booking-service
          predicates:
            - Path=/ws/**

        # ═══════════════════════════════════════════════════════
        #  PLATFORM SERVICE (notifications + analytics + admin + storage)
        #  Port 8084 — merged from: notification, analytics, admin, storage
        # ═══════════════════════════════════════════════════════
        - id: platform-notifications
          uri: lb://platform-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: platform-analytics
          uri: lb://platform-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: platform-admin
          uri: lb://platform-service
          predicates:
            - Path=/api/admin/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: platform-storage
          uri: lb://platform-service
          predicates:
            - Path=/api/storage/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

      # Global CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

# Eureka client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# JWT secret (shared)
jwt:
  secret: "dG91ci1ib29raW5nLXBsYXRmb3JtLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1zaWduaW5n"

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
