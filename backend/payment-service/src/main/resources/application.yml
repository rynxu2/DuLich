server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: dulich
    password: dulich_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: dulich
    password: dulich_secret

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Payment gateway configs (placeholders)
payment:
  vnpay:
    tmn-code: "YOUR_VNPAY_TMN_CODE"
    hash-secret: "YOUR_VNPAY_HASH_SECRET"
    url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
    return-url: "http://localhost:8080/api/payments/vnpay/callback"
  momo:
    partner-code: "YOUR_MOMO_PARTNER_CODE"
    access-key: "YOUR_MOMO_ACCESS_KEY"
    secret-key: "YOUR_MOMO_SECRET_KEY"
    endpoint: "https://test-payment.momo.vn/v2/gateway/api/create"
  zalopay:
    app-id: "YOUR_ZALOPAY_APP_ID"
    key1: "YOUR_ZALOPAY_KEY1"
    key2: "YOUR_ZALOPAY_KEY2"
    endpoint: "https://sb-openapi.zalopay.vn/v2/create"
